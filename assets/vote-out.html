<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survivor Admin - Vote Out Player</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <script src="auth.js"></script>
</head>
<body>
    <div id="app">
        <!-- Login Overlay -->
        <div class="login-overlay" v-if="!isAuthenticated">
            <div class="login-container">
                <h2 class="login-title">Admin Login</h2>
                <form @submit.prevent="handleLogin">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            v-model="username" 
                            required
                            autocomplete="username"
                        />
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            v-model="password" 
                            required
                            autocomplete="current-password"
                        />
                    </div>
                    <button type="submit" class="login-button">Login</button>
                    <p class="login-error" v-if="loginError">{{ loginError }}</p>
                </form>
            </div>
        </div>

        <!-- Main Application (only shown when authenticated) -->
        <div class="container" v-if="isAuthenticated">
            <h2>Vote Out Player</h2>

            <!-- Players List -->
            <div>
                <h3>Season Players</h3>
                <ul class="player-grid">
                    <li v-for="player in players" :key="player.name" :class="{'voted-out-player': player.voted_out}">
                        <img :src="player.image_url" :alt="player.name" class="player-image" />
                        {{ player.name }}
                    </li>
                </ul>
            </div>

            <!-- Draft Form -->
            <form id="draftForm" @submit.prevent="handleSubmit">
                <label for="player1">Player to vote out:</label>
                <select v-model="player1" required>
                    <option v-for="player in availablePlayers" :key="player.name" :value="player.name">
                        {{ player.name }}
                    </option>
                </select><br><br>

                <!-- Error Message -->
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>

                <button type="submit">Vote Out</button>
            </form>

            <a href="index.html" class="back-link">Back to Drafts</a>
            <button @click="logout" class="logout-button">Logout</button>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                isAuthenticated: false,
                authToken: '',
                username: '',
                password: '',
                loginError: '',
                players: [],
                playerVotedOut: '',
                player1: '',
                errorMessage: '' // Store error message
            },
            mounted() {
                // Check if there's a saved token in localStorage
                const savedToken = SurvivorAuth.getToken();
                if (savedToken) {
                    this.authToken = savedToken;
                    this.validateToken();
                }
            },
            computed: {
                // Available players filter out players who have been voted out
                availablePlayers() {
                    return this.players.filter(player => !player.voted_out);
                }
            },
            methods: {
                async handleLogin() {
                    const result = await SurvivorAuth.login(this.username, this.password);

                    if (result.success) {
                        this.authToken = result.token;
                        this.isAuthenticated = true;
                        this.loadPlayers();
                        this.loginError = '';
                    } else {
                        this.loginError = result.error;
                        this.authToken = '';
                    }
                },

                async validateToken() {
                    const isValid = await SurvivorAuth.validate(this.authToken);

                    if (isValid) {
                        this.isAuthenticated = true;
                        this.loadPlayers();
                    } else {
                        this.authToken = '';
                    }
                },

                logout() {
                    this.isAuthenticated = false;
                    this.authToken = '';
                    SurvivorAuth.logout();
                    this.username = '';
                    this.password = '';
                },
                
                loadPlayers() {
                    // Fetch players with the auth token
                    fetch('/api/players', {
                        headers: {
                            'Authorization': this.authToken
                        }
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Failed to load players');
                        }
                        return response.json();
                    })
                    .then(data => {
                        this.players = data;
                    })
                    .catch(error => {
                        console.error('Error loading players:', error);
                        this.errorMessage = 'Failed to load players. Please try again.';
                        // If unauthorized, log out
                        if (error.message.includes('401')) {
                            this.logout();
                        }
                    });
                },
                
                handleSubmit() {
                    this.errorMessage = ''; // Reset error message

                    // If validation passes, send the draft data
                    const voteOutRequest = {
                        player: this.player1
                    };

                    fetch('/api/vote-out', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': this.authToken
                        },
                        body: JSON.stringify(voteOutRequest)
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`Error: ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(() => {
                        // Clear the form fields after successful submission
                        this.player1 = '';
                        // Reload the players to update the UI
                        this.loadPlayers();
                    })
                    .catch(error => {
                        console.error('Error voting out player', error);
                        this.errorMessage = 'Failed to vote out player. Please try again.';
                        
                        // If unauthorized, log out
                        if (error.message.includes('401')) {
                            this.logout();
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
